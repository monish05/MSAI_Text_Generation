# One user message, one intended tool (may look like another tool)
ambiguous:
  - action: lookup_location
    templates:
      - "Is {name} in Mudd?"
      - "Would I find Professor {last_name} in Tech?"
      - "Is {name}'s office in the main building?"
      - "Room for {name} — which hall?"
  - action: lookup_person
    templates:
      - "Hammond — what does he teach?"
      - "Tell me about Professor {last_name}."
      - "I'm meeting {name} — who are they?"
  - action: lookup_office_hours
    templates:
      - "When is {class_name} on {day}?"
      - "{person} — any hours Friday?"
  - action: lookup_faculty_topic
    templates:
      - "Who does {topic} here?"
      - "Anyone in CS for {topic}?"
  - action: lookup_center
    templates:
      - "Who runs {center}?"
      - "Is {faculty} in charge of a center?"
      - "Leadership at {center}?"
  - action: lookup_advisorship
    templates:
      - "Who's {name}'s advisor?"
      - "Students under {name}?"
      - "Advising for {name} — who and where?"
  - action: lookup_staff_support
    templates:
      - "Who do I email about {topic}?"
      - "Reimbursements — who in the department?"
      - "Travel paperwork contact?"
  - action: list_events
    templates:
      - "Anything on {keyword} this month?"
      - "Seminars about {keyword}?"
  - action: noop
    templates:
      - "What's the weather in Evanston?"
      - "Write my homework in Python."
      - "Book me a hotel in Chicago."

# One user message, multiple tools in one assistant JSON (actions array)
multi_tool:
  - user: "Tell me about {name} and where their office is."
    actions: [lookup_person, lookup_location]
  - user: "Who is {name}, and what are their office hours?"
    actions: [lookup_person, lookup_office_hours]
  - user: "Which faculty work on {topic}, and are there any {keyword} events?"
    actions: [lookup_faculty_topic, list_events]
  - user: "Who leads {center} and what is their title?"
    actions: [lookup_center, lookup_person]
  - user: "Where is {name}'s office, and who advises them?"
    actions: [lookup_location, lookup_advisorship]
  - user: "Who handles {topic}, and where is their office?"
    actions: [lookup_staff_support, lookup_location]
  - user: "What centers does {faculty} lead, and where are they located?"
    actions: [lookup_center, lookup_location]
  - user: "Office hours for {class_name} and who teaches it?"
    actions: [lookup_office_hours, lookup_person]
  - user: "Any {keyword} events, and which faculty work on {topic}?"
    actions: [list_events, lookup_faculty_topic]
  - user: "Who researches {topic}, and what is {name}'s title?"
    actions: [lookup_faculty_topic, lookup_person]
  - user: "Advising info for {name} and their office location."
    actions: [lookup_advisorship, lookup_location]

multi_turn:
  - first_action: lookup_location
    first_template: "Where can I find {name}?"
    follow_action: lookup_location
    follow_template: "Where can I find {name}?"
    topic_switch: true
    topic: professor
  - first_action: lookup_location
    first_template: "Hi, where can I find {name}?"
    follow_action: lookup_location
    follow_template: "where can I find {name}?"
    topic_switch: true
