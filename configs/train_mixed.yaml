# Laptop / smaller GPU — kiosk + light xLAM/Glaive (same mix as train_quest_mixed)
paths:
  data_raw: data
  kiosk_synthetic: data/kiosk_synthetic
  kiosk_repo: ../kiosk_vanilla
  kiosk_archive: ../kiosk_vanilla/Archive

mix_weights:
  kiosk: 0.9
  xlam: 0.05
  glaive: 0.05
  toolbench: 0.0
  alpaca: 0.0

model:
  d_model: 256
  n_heads: 4
  n_layers: 6
  d_ff: 1024
  max_seq_len: 1024
  dropout: 0.1

tokenizer:
  vocab_size: 12000
  min_frequency: 2

training:
  num_epochs: 20
  samples_per_epoch: 0
  val_samples: 2000
  batch_size: 64
  num_workers: 4
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip: 1.0
  grad_accumulation_steps: 1
  eval_every_epochs: 1
  holdout_eval_every_epochs: 1
  best_checkpoint_metric: holdout_composite
  plot_every_epochs: 1
  log_every: 50
  device: auto
  seed: 44

synthetic:
  n_total: 10000
  n_holdout: 500
  val_ratio: 0.1
  multi_turn_ratio: 0.22
  ambiguous_ratio: 0.08
  multi_tool_ratio: 0.08
  seed: 42
  max_retries: 3
  name_repeat_window: 40
  prefix_prob: 0.12

converter_limits:
  xlam: 20000
  glaive: 20000
  toolbench: 0
  alpaca: 0
