# Quest H100 — larger vanilla kiosk agent LM
paths:
  data_raw: data
  kiosk_synthetic: data/kiosk_synthetic
  kiosk_repo: ../kiosk
  kiosk_archive: ../kiosk/Archive

mix_weights:
  kiosk: 1.0
  toolbench: 0.0
  alpaca: 0.0
  xlam: 0.0
  glaive: 0.0

model:
  d_model: 512
  n_heads: 8
  n_layers: 12
  d_ff: 2048
  max_seq_len: 1024
  dropout: 0.1

tokenizer:
  vocab_size: 12000
  min_frequency: 2

training:
  num_epochs: 30
  samples_per_epoch: 0          # 0 = max(100k, shard lines); set e.g. 50000 to shorten epochs
  val_samples: 5000
  batch_size: 8                   # 64×1024 OOMs on 12L/512d; 8×32 ≈ same effective batch
  grad_accumulation_steps: 32
  num_workers: 4
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 1500
  grad_clip: 1.0
  eval_every_epochs: 1
  holdout_eval_every_epochs: 1
  best_checkpoint_metric: holdout_action_acc
  plot_every_epochs: 1
  log_every: 50
  device: cuda
  seed: 42

synthetic:
  n_total: 10000
  n_holdout: 500
  val_ratio: 0.1
  multi_turn_ratio: 0.22
  ambiguous_ratio: 0.08
  multi_tool_ratio: 0.08
  seed: 42
  max_retries: 3
  name_repeat_window: 40
  prefix_prob: 0.12

converter_limits:
  xlam: 0
  glaive: 0
  toolbench: 0
  alpaca: 0
