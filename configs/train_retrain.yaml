# Retrain run — kiosk-only, compact system, save best.pt by action match (Quest GPU)
# Laptop: generate_synthetic → preprocess → train_tokenizer → rsync
# Quest:  python scripts/train.py --config configs/train_retrain.yaml

paths:
  data_raw: data
  kiosk_synthetic: data/kiosk_synthetic
  kiosk_repo: ../kiosk_vanilla
  kiosk_archive: ../kiosk_vanilla/Archive

mix_weights:
  kiosk: 1.0
  xlam: 0.0
  glaive: 0.0
  toolbench: 0.0
  alpaca: 0.0

model:
  d_model: 512
  n_heads: 8
  n_layers: 12
  d_ff: 2048
  max_seq_len: 2048
  dropout: 0.1

# rich = full tool descriptions + param hints (~600 tokens); needs max_seq_len >= 1536
prompt:
  system_style: rich

tokenizer:
  vocab_size: 12000
  min_frequency: 2

training:
  num_epochs: 25
  samples_per_epoch: 0
  val_samples: 5000
  batch_size: 8
  grad_accumulation_steps: 32
  num_workers: 4
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 1500
  grad_clip: 1.0
  eval_every_epochs: 1
  holdout_eval_every_epochs: 1
  best_checkpoint_metric: holdout_action_acc
  plot_every_epochs: 1
  log_every: 50
  device: cuda
  seed: 45

synthetic:
  n_total: 12000
  n_holdout: 500
  val_ratio: 0.1
  multi_turn_ratio: 0.28
  ambiguous_ratio: 0.08
  multi_tool_ratio: 0.08
  seed: 45
  max_retries: 3
  name_repeat_window: 40
  prefix_prob: 0.12

converter_limits:
  xlam: 0
  glaive: 0
  toolbench: 0
  alpaca: 0
