# Quest H100 — kiosk agent LM + light xLAM/Glaive mix (JSON + fluency)
# Run after kiosk-only baseline, or when answers/JSON need a boost.
#
# Preprocess on Quest (needs raw corpora under data/):
#   python scripts/preprocess.py --config configs/train_quest_mixed.yaml
# Train:
#   python scripts/train.py --config configs/train_quest_mixed.yaml
paths:
  data_raw: data
  kiosk_synthetic: data/kiosk_synthetic
  kiosk_repo: ../kiosk_vanilla
  kiosk_archive: ../kiosk_vanilla/Archive

mix_weights:
  kiosk: 0.9
  xlam: 0.05
  glaive: 0.05
  toolbench: 0.0
  alpaca: 0.0

model:
  d_model: 512
  n_heads: 8
  n_layers: 12
  d_ff: 2048
  max_seq_len: 1024
  dropout: 0.1

tokenizer:
  vocab_size: 12000
  min_frequency: 2

training:
  num_epochs: 30
  samples_per_epoch: 0
  val_samples: 5000
  batch_size: 8
  grad_accumulation_steps: 32
  num_workers: 4
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 1500
  grad_clip: 1.0
  eval_every_epochs: 1
  holdout_eval_every_epochs: 1
  best_checkpoint_metric: holdout_composite
  plot_every_epochs: 1
  log_every: 50
  device: cuda
  seed: 44

synthetic:
  n_total: 10000
  n_holdout: 500
  val_ratio: 0.1
  multi_turn_ratio: 0.22
  ambiguous_ratio: 0.08
  multi_tool_ratio: 0.08
  seed: 42
  max_retries: 3
  name_repeat_window: 40
  prefix_prob: 0.12

# Caps conversion size on Quest (0 = no cap). Rows use same <|system|> format as kiosk.
converter_limits:
  xlam: 20000
  glaive: 20000
  toolbench: 0
  alpaca: 0
