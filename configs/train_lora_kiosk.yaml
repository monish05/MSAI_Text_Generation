# LoRA fine-tune on kiosk shards (Path B escalation)
base_model: Qwen/Qwen2.5-1.5B-Instruct
adapter_dir: checkpoints/lora_kiosk

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

training:
  num_epochs: 5
  batch_size: 4
  grad_accumulation_steps: 8
  lr: 2.0e-4
  max_seq_len: 512
  warmup_ratio: 0.05
  weight_decay: 0.01
  device: cuda
  seed: 44
  # Quest home quota: avoid per-epoch HF checkpoints (embed+LoRA ~GB each).
  save_strategy: "no"

paths:
  train_jsonl: data/processed/kiosk_train.jsonl
  val_jsonl: data/processed/kiosk_val.jsonl
